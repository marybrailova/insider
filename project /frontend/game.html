<!doctype html>
<html lang="ru">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Инсайдер</title>
    <link rel="stylesheet" href="game.css" />

  </head>

  <body>
    <h1 style="text-align: center;">Инсайдер</h1>
    <div class="page">

      <header class="topbar">
        <div class="top-left">
          <span class="clock">⏱️</span>
          <div>
            <div class="muted" id="timerLabel">01:00 до конца хода</div>
          </div>
        </div>
        <div class="day" id="dayLabel">день 1/10</div>
        <div class="avatar">📅</div>
      </header>

      <section class="stats">
        <div class="stat-block">
          <div class="stat-item">
            <span class="icon">💰</span>
            <span id="balanceLabel">баланс: 2000 монет</span>
          </div>
          <div class="stat-item">
            <span class="icon">💵</span>
            <span id="capitalLabel">капитал: 2000 монет</span>
          </div>
        </div>
        <div class="stat-risk">
          <div class="risk-label">риск проверки</div>
          <div class="risk-meter">
            <div class="risk-fill" id="riskFill" style="width: 0%"></div>
          </div>
          <div class="risk-value" id="riskLabel">0%</div>
        </div>
      </section>

      <section class="news">
        <h2>Новости и слухи дня</h2>
        <div class="cards" id="cards"></div>
      </section>

      <section class="bottom">
        <div class="ranking">
          <h3>Рейтинг игроков</h3>
          <ol id="ranking">
            <li class="you"><span>Вы</span><span id="youCapital">2000</span></li>
          </ol>
        </div>
        <div class="controls">
          <button class="btn primary" id="endDayBtn">завершить день</button>
        </div>
      </section>
    </div>
    <div id="modalRoot"></div>
    <script type="module" src="game.js"></script>

  </body>
</html>
