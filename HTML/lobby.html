<!doctype html>
<html lang="ru">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Инсайдер — Лобби</title>
    <link rel="stylesheet" href="pages.css" />
    <script src="lobby-page.js" defer></script>

  </head>

  <body>
    <h1 class="welcome-title">Инсайдер</h1>
    <div class="page">

      <header class="topbar">
        <div class="top-left">
          <span class="clock">👥</span>
        </div>
        <div class="day">Лобби</div>
        <div class="avatar">👥</div>
      </header>

      <section class="news">
        <h2>Создать игру</h2>
        <div class="card" style="margin-bottom: 16px;">
          <label>Название игры</label>
          <input id="roomTitle" placeholder="Например Рынок 1" />
          <label>Формат комнаты</label>
          <select id="roomType">
            <option value="private">частная</option>
            <option value="public">публичная</option>
          </select>
          <label>Игроки</label>
          <input id="roomMaxPlayers" type="number" min="2" max="10" value="3" />
          <button class="btn primary" id="createRoomBtn" type="button">создать</button>
          <div id="createRoomMsg"></div>
        </div>
        <h2>Войти по коду</h2>
        <div class="card" style="margin-bottom: 16px;">
          <label>Код игры</label>
          <input id="joinCode" placeholder="Например A1B2C" />
          <button class="btn primary" id="joinByCodeBtn" type="button">войти в игру</button>
          <div id="joinCodeMsg"></div>
        </div>
        <h2>Активные игры</h2>
        <div class="cards" id="roomsList">
        </div>
      </section>

      <section class="bottom">
        <div class="controls">
          <a class="btn" href="auth.html">назад</a>
        </div>
      </section>
    </div>

  </body>
</html>
