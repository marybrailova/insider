<!-- объявляем тип документа html5 -->
<!doctype html>
<!-- основной язык страницы русский -->
<html lang="ru">

  <!-- head содержит служебную информацию страницы -->
  <head>
    <!-- задаём кодировку utf-8 -->
    <meta charset="UTF-8" />
    <!-- настройка адаптивности под ширину экрана -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- название страницы во вкладке браузера -->
    <title>Инсайдер — Лобби</title>
    <!-- подключаем общий css-файл страниц -->
    <link rel="stylesheet" href="pages.css" />
    <!-- подключаем javascript с логикой комнат -->
    <!-- defer запускает скрипт после загрузки html -->
    <script src="lobby-page.js" defer></script>

  </head>

  <!-- body содержит весь видимый контент страницы -->
  <body>
    <!-- главный заголовок сайта -->
    <h1 class="welcome-title">Инсайдер</h1>
    <!-- основной контейнер страницы -->
    <div class="page">

      <!-- верхняя панель лобби -->
      <header class="topbar">
        <!-- левая иконка игроков -->
        <div class="top-left">
          <span class="clock">👥</span>
        </div>
        <!-- название текущего раздела -->
        <div class="day">Лобби</div>
        <!-- правая иконка игроков -->
        <div class="avatar">👥</div>
      </header>

      <!-- основной блок с комнатами -->
      <section class="news">
        <!-- форма создания новой комнаты -->
        <h2>Создать игру</h2>
        <div class="card" style="margin-bottom: 16px;">
          <!-- поле названия комнаты -->
          <label>Название игры</label>
          <input id="roomTitle" placeholder="Например Рынок 1" />
          <!-- выбор публичной или частной комнаты -->
          <label>Формат комнаты</label>
          <select id="roomType">
            <option value="private">частная</option>
            <option value="public">публичная</option>
          </select>
          <!-- максимальное количество игроков -->
          <label>Игроки</label>
          <input id="roomMaxPlayers" type="number" min="2" max="10" value="3" />
          <!-- кнопка создания комнаты -->
          <button class="btn primary" id="createRoomBtn" type="button">создать</button>
          <!-- сюда javascript выводит код комнаты или ошибку -->
          <div id="createRoomMsg"></div>
        </div>
        <!-- форма входа в частную комнату -->
        <h2>Войти по коду</h2>
        <div class="card" style="margin-bottom: 16px;">
          <!-- поле для кода комнаты -->
          <label>Код игры</label>
          <input id="joinCode" placeholder="Например A1B2C" />
          <!-- кнопка входа по коду -->
          <button class="btn primary" id="joinByCodeBtn" type="button">войти в игру</button>
          <!-- сюда выводится ошибка входа -->
          <div id="joinCodeMsg"></div>
        </div>
        <!-- список публичных комнат -->
        <h2>Активные игры</h2>
        <!-- lobby-page.js добавляет карточки комнат в этот блок -->
        <div class="cards" id="roomsList">
        </div>
      </section>

      <!-- нижняя панель навигации -->
      <section class="bottom">
        <div class="controls">
          <!-- ссылка назад к авторизации -->
          <a class="btn" href="auth.html">назад</a>
        </div>
      </section>
    </div>

  </body>
</html>
