<!-- объявляем тип документа html5 -->
<!doctype html>

<!-- основной язык страницы русский -->
<html lang="ru">

  <!-- head хранит служебную информацию страницы -->
  <!-- эта часть не отображается напрямую на экране -->
  <head>

    <!-- нужна, чтобы русский текст и emoji отображались корректно -->
    <meta charset="UTF-8" />

    <!-- настройка адаптивности под разные экраны -->
    <!-- width=device-width делает ширину страницы равной ширине устройства -->
    <!-- initial-scale=1.0 задаёт нормальный масштаб при открытии -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- название вкладки браузера -->
    <title>Инсайдер</title>

    <!-- подключаем css-файл именно для игрового экрана -->
    <!-- в game.css лежат стили таймера, карточек компаний, рейтинга, риска и кнопок -->
    <link rel="stylesheet" href="game.css" />

  </head>

  <!-- body содержит всё, что пользователь видит на странице -->
  <body>

    <!-- главный заголовок игры -->
    <!-- класс welcome-title задаёт крупный заголовок сверху -->
    <h1 class="welcome-title">Инсайдер</h1>

    <!-- основной контейнер игрового экрана -->
    <!-- внутри него находятся таймер, статистика, карточки компаний и рейтинг -->
    <div class="page">

      <!-- верхняя панель игры -->
      <!-- здесь показываются таймер, текущий день и иконка календаря -->
      <header class="topbar">

        <!-- левая часть верхней панели -->
        <!-- тут находится иконка таймера и текст с оставшимся временем -->
        <div class="top-left">

          <!-- эмодзи таймера -->
          <span class="clock">⏱️</span>

          <!-- контейнер для текста таймера -->
          <div>

            <!-- текст таймера -->
            <!-- id="timerLabel" нужен, чтобы game.js обновлял время каждый ход -->
            <div class="muted" id="timerLabel">01:00 до конца хода</div>
          </div>
        </div>

        <!-- отображение текущего игрового дня -->
        <!-- id="dayLabel" нужен, чтобы js менял день: день 1/10, день 2/10 и т.д. -->
        <div class="day" id="dayLabel">день 1/10</div>

        <!-- эмодзи справа -->
        <div class="avatar">📅</div>
      </header>

      <!-- блок статистики игрока -->
      <!-- показывает баланс, капитал и риск проверки -->
      <section class="stats">

        <!-- блок с денежными показателями -->
        <div class="stat-block">

          <!-- строка баланса -->
          <div class="stat-item">

            <!-- иконка баланса -->
            <span class="icon">💰</span>

            <!-- значение баланса -->
            <!-- id="balanceLabel" обновляется из game.js -->
            <span id="balanceLabel">баланс: 2000 монет</span>
          </div>

          <!-- строка капитала -->
          <div class="stat-item">

            <!-- иконка капитала -->
            <span class="icon">💵</span>

            <!-- значение капитала -->
            <!-- капитал = деньги + стоимость всех акций -->
            <!-- id="capitalLabel" обновляется после изменения состояния игры -->
            <span id="capitalLabel">капитал: 2000 монет</span>
          </div>
        </div>

        <!-- блок риска проверки -->
        <!-- риск увеличивается при использовании инсайда -->
        <div class="stat-risk">

          <!-- подпись индикатора риска -->
          <div class="risk-label">риск проверки</div>

          <!-- внешний контейнер шкалы риска -->
          <div class="risk-meter">

            <!-- заполненная часть шкалы риска -->
            <!-- ширина меняется через style="width: ..." -->
            <!-- id="riskFill" нужен, чтобы game.js обновлял процент заполнения -->
            <div class="risk-fill" id="riskFill" style="width: 0%"></div>
          </div>

          <!-- текстовое значение риска -->
          <!-- id="riskLabel" обновляется вместе со шкалой -->
          <div class="risk-value" id="riskLabel">0%</div>
        </div>
      </section>

      <!-- блок новостей и слухов -->
      <!-- сюда выводятся карточки компаний на текущий день -->
      <section class="news">

        <!-- заголовок секции с информацией дня -->
        <h2>Новости и слухи дня</h2>

        <!-- контейнер для карточек компаний -->
        <!-- id="cards" нужен, чтобы game.js динамически вставлял карточки -->
        <!-- карточки не прописаны в html вручную, они создаются через javascript -->
        <div class="cards" id="cards"></div>
      </section>

      <!-- нижняя часть игрового экрана -->
      <!-- содержит рейтинг игроков и кнопку завершения дня -->
      <section class="bottom">

        <!-- блок рейтинга игроков -->
        <div class="ranking">

          <!-- заголовок рейтинга -->
          <h3>Рейтинг игроков</h3>

          <!-- нумерованный список игроков -->
          <!-- id="ranking" нужен, чтобы game.js обновлял список игроков -->
          <ol id="ranking">

            <!-- стартовая строка рейтинга до загрузки данных с backend -->
            <!-- class="you" выделяет текущего игрока -->
            <li class="you">
              <span>Вы</span>
              <span id="youCapital">2000</span>
            </li>
          </ol>
        </div>

        <!-- блок кнопок управления -->
        <div class="controls">

          <!-- кнопка завершения игрового дня -->
          <!-- id="endDayBtn" нужен, чтобы game.js повесил обработчик нажатия -->
          <!-- при нажатии отправляется запрос на backend о завершении дня -->
          <button class="btn primary" id="endDayBtn">завершить день</button>
        </div>
      </section>
    </div>

    <!-- корневой контейнер для модальных окон -->
    <!-- game.js может добавлять сюда всплывающие окна с событиями -->
    <div id="modalRoot"></div>

    <!-- подключение основного javascript игры -->
    <!-- type="module" позволяет использовать современный js-модуль -->
    <!-- game.js загружает состояние игры, обновляет интерфейс и отправляет действия игрока -->
    <script type="module" src="game.js"></script>

  </body>
</html>
