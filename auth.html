<!-- объявляем тип документа html5 -->
<!doctype html>

<!-- основной язык страницы русский -->
<html lang="ru">

  <!-- head содержит служебную информацию о странице -->
  <!-- здесь нет видимого контента -->
  <head>

    <!-- задаём кодировку utf-8 -->
    <!-- она нужна чтобы русский текст и emoji отображались корректно -->
    <meta charset="UTF-8" />

    <!-- настройка адаптивности страницы -->
    <!-- width=device-width означает, что ширина страницы равна ширине экрана устройства -->
    <!-- initial-scale=1.0 означает, что страница открывается без увеличения или уменьшения -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- текст, который отображается во вкладке браузера -->
    <title>Инсайдер — Вход и регистрация</title>

    <!-- подключаем общий css-файл для страниц welcome/rules/auth/lobby -->
    <link rel="stylesheet" href="pages.css" />

    <!-- подключаем javascript-файл для логики авторизации -->
    <!-- auth-page.js обрабатывает нажатия на кнопки входа и регистрации -->
    <!-- defer нужен тобы скрипт выполнился после загрузки html-разметки -->
    <script src="auth-page.js" defer></script>

  </head>

  <!-- body содержит весь видимый контент страницы -->
  <body>

    <!-- главный заголовок сайта -->
    <!-- класс welcome-title задаёт крупный стиль заголовка -->
    <h1 class="welcome-title">Инсайдер</h1>

    <!-- основной контейнер страницы -->
    <!-- класс page задаёт рамку, фон, ширину и тень -->
    <div class="page">

      <!-- верхняя панель страницы -->
      <!-- она одинаково стилизует разделы сайта -->
      <header class="topbar">

        <!-- левая часть верхней панели -->
        <div class="top-left">

          <!-- эмодзи замка -->
          <!-- класс clock используется для большого размера emoji -->
          <span class="clock">🔐</span>
        </div>

        <!-- центральная подпись текущего раздела -->
        <div class="day">Аккаунт</div>

        <!-- правая эмодзи -->
        <div class="avatar">🔐</div>
      </header>

      <!-- основной контент страницы -->
      <!-- класс news используется как общий блок содержимого -->
      <section class="news">

        <!-- заголовок блока входа -->
        <h2>Вход</h2>

        <!-- карточка входа -->
        <!-- class="card" задаёт рамку и внутренние отступы -->
        <!-- style="margin-bottom: 16px;" добавляет отступ между входом и регистрацией -->
        <div class="card" style="margin-bottom: 16px;">

          <!-- подпись к полю логина -->
          <label>Имя</label>

          <!-- поле ввода имени для входа -->
          <!-- id="loginName" нужен, чтобы auth-page.js мог получить это поле -->
          <!-- placeholder показывает подсказку внутри input -->
          <input id="loginName" placeholder="Имя" />

          <!-- подпись к полю пароля -->
          <label>Пароль</label>

          <!-- поле ввода пароля для входа -->
          <!-- type="password" скрывает введённые символы -->
          <!-- id="loginPass" используется в js для получения пароля -->
          <input id="loginPass" type="password" placeholder="Пароль" />

          <!-- кнопка входа -->
          <!-- class="btn primary" задаёт стиль основной кнопки -->
          <!-- id="loginBtn" нужен, чтобы в auth-page.js повесить обработчик onclick -->
          <button class="btn primary" id="loginBtn">войти</button>

          <!-- блок для сообщения об ошибке входа -->
          <!-- например: неверный пароль или пользователь не найден -->
          <!-- js записывает текст ошибки в loginMsg.textContent -->
          <div id="loginMsg"></div>
        </div>

        <!-- заголовок блока регистрации -->
        <h2>Регистрация</h2>

        <!-- карточка регистрации -->
        <div class="card">

          <!-- подпись к полю имени -->
          <label>Имя</label>

          <!-- поле ввода имени для регистрации -->
          <!-- id="regName" используется в js при отправке /api/register -->
          <input id="regName" placeholder="Имя" />

          <!-- подпись к полю пароля -->
          <label>Пароль</label>

          <!-- поле ввода пароля при регистрации -->
          <!-- type="password" скрывает пароль -->
          <!-- id="regPass" используется в js -->
          <input id="regPass" type="password" placeholder="Пароль" />

          <!-- кнопка регистрации -->
          <!-- id="regBtn" нужен для обработчика нажатия -->
          <button class="btn primary" id="regBtn">зарегистрироваться</button>

          <!-- блок для вывода ошибки регистрации -->
          <div id="regMsg"></div>
        </div>
      </section>

      <!-- нижняя панель навигации -->
      <section class="bottom">

        <!-- контейнер для кнопок -->
        <div class="controls">

          <!-- ссылка назад к правилам -->
          <!-- выглядит как кнопка благодаря class="btn" -->
          <a class="btn" href="rules.html">назад</a>

          <!-- ссылка в лобби -->
          <!-- primary выделяет кнопку как основную -->
          <!-- по-хорошему доступ к лобби должен быть после входа, но ссылка нужна для навигации -->
          <a class="btn primary" href="lobby.html">к лобби</a>
        </div>
      </section>
    </div>

  </body>
</html>
